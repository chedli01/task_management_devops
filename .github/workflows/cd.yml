name: Production CD

# Trigger automatically after the CI workflow completes
on:
  workflow_run:
    workflows: ["Production CI"]  # Must match the name of your CI workflow
    types:
      - completed 

jobs:
  deploy:

    runs-on: ubuntu-latest
    permissions:
      contents: read  # Required to read workflow artifacts
      actions: read   # Required to access workflow run data
    steps:
      - name: Download image tag artifact
        uses: actions/download-artifact@v4
        with:
          name: image-tag
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read image tag
        id: get_image_tag
        run: echo "IMAGE_TAG=$(cat image_tag.txt)" >> $GITHUB_ENV

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update VM via Extension
        run: |
          # Update docker-compose on VM without SSH
          az vm extension set \
            --resource-group taskmanager-prod-rg \
            --vm-name taskmanager-prod-vm \
            --name CustomScript \
            --publisher Microsoft.Azure.Extensions \
            --version 2.1 \
            --force-update \
            --settings '{"commandToExecute": "cd /opt/task-manager && sed -i \"s/:latest/:${{ env.IMAGE_TAG }}/g\" && docker-compose -f docker-compose.yml down  && docker-compose -f docker-compose.yml pull && docker-compose -f docker-compose.yml up -d"}' \
