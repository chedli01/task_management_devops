name: Production CD

# Trigger automatically after the CI workflow completes
on:
  workflow_run:
    workflows: ["Production CI"]  # Must match the name of your CI workflow
    types:
      - completed

jobs:
  deploy:
    # Only run if CI workflow was successful
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      VAULT_PASS: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Extract the image tag from CI (commit SHA)
      - name: Set IMAGE_TAG from last commit
        run: echo "IMAGE_TAG=${{ github.event.workflow_run.head_commit.id }}" >> $GITHUB_ENV

      # Optional: print the tag
      - name: Show IMAGE_TAG
        run: echo "Deploying with IMAGE_TAG=$IMAGE_TAG"
        ################################################
      - name: Run server setup
        working-directory: ./ansible
        run: |
          chmod +x ./scripts/setup.sh
          ./scripts/setup.sh

      # Run the deploy script with environment variables
      - name: Deploy application with Ansible
        working-directory: ./github
        run: |
          chmod +x ./scripts/deploy_prod.sh
          ./scripts/deploy_prod.sh
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          VAULT_PASS: ${{ env.VAULT_PASS }}
