name: Production CD

on:
  # workflow_run:
  #   workflows: ["Production CI"]
  #   types:
  #     - completed 
  push:
    branches:
      - 'main'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Download image tag artifact
        uses: actions/download-artifact@v4
        with:
          name: image-tag
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read image tag
        id: get_image_tag
        run: echo "IMAGE_TAG=$(cat image_tag.txt)" >> $GITHUB_ENV

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to VM
        run: |
          az vm extension set \
            --resource-group taskmanager-prod-rg \
            --vm-name taskmanager-prod-vm \
            --name CustomScript \
            --publisher Microsoft.Azure.Extensions \
            --version 2.1 \
            --force-update \
            --settings '{"commandToExecute": "export IMAGE_TAG=${{ env.IMAGE_TAG }} && cd /opt/task-manager && docker compose down && docker compose pull && docker compose up -d"}'