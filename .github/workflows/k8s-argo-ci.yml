name: Build App images and Update Manifests

on:
  push:
    branches:
      - main
    paths:
      - 'app-code/**'

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: chedli01/task-manager-backend
  FRONTEND_IMAGE: chedli01/task-manager-frontend-nginx

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./app-code/prod/backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./app-code/dev/frontend 
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest

      - name: Update Kubernetes Manifests (GitOps)
        run: |
          cd kubernetes/overlays/prod
          
          kustomize edit set image my-registry/backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          kustomize edit set image my-registry/frontend=${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          git commit -am "Update app images to ${{ github.sha }} [skip ci]"
          
          git push