name: Production-k8s CI

on:
  push:
    branches:
        - 'main'

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: chedli01/task-manager-backend
  FRONTEND_IMAGE: chedli01/task-manager-frontend-nginx

jobs:
  test:
   runs-on: ubuntu-latest

   steps:
    - uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 18

    # -------- Frontend --------
    - name: Install frontend dependencies
      working-directory: ./app-code/dev/frontend
      run: npm ci

    - name: Lint frontend
      working-directory: ./app-code/dev/frontend
      run: npm run lint
  


  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: set_image_tag
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "${GITHUB_SHA::7}" > image_tag.txt

      - name: Upload image tag artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-tag
          path: image_tag.txt
          
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./app-code/prod/backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./app-code/dev/frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.FRONTEND_IMAGE }}:latest

      - name: Print image tag
        run: echo "Built images with tag $IMAGE_TAG"
