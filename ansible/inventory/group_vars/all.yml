project_name: task-manager
environment: production
app_dir: /opt/task-manager
docker_compose_file: "/opt/task-manager/docker-compose.yml"
docker_network: task-manager-network
system_packages:
  - curl
  - wget
  - git
  - vim
  - htop
  - unzip
  - software-properties-common
  - apt-transport-https
  - ca-certificates
  - gnupg
  - lsb-release
backup_schedule: "0 2 * * *"  # Daily at 2 AM
