[defaults]
# Inventory file location
inventory = inventory/hosts.yml

# Don't check SSH host keys (for new VMs)
host_key_checking = False

# Use the SSH key from Terraform
private_key_file = ~/.ssh/azure_taskmanager

# Default remote user
remote_user = azureuser
roles_path = /home/task_management_project/task_management_devops/ansible/roles


# Increase timeout for slow operations
timeout = 30

# Logging
log_path = ./ansible.log

# Show colors
force_color = True

# Retry failed hosts
retry_files_enabled = False

# Performance
forks = 5
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 3600

[privilege_escalation]
# Use sudo for privilege escalation
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
# SSH settings
pipelining = True
control_path = /tmp/ansible-ssh-%%h-%%p-%%r