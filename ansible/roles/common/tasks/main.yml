- name: FORCE CLEANUP Remove broken Docker repo files before APT runs
  shell: |
    rm -f /etc/apt/sources.list.d/docker.list
    rm -f /etc/apt/sources.list.d/download_docker_com_linux_ubuntu.list
  args:
    executable: /bin/bash
  # We use shell because the 'apt' module will fail if these files exist with conflicts
  tags: [always]

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  tags: [common, packages]

- name: Upgrade all packages
  apt:
    upgrade: dist
    autoremove: yes
    autoclean: yes
  tags: [common, packages]

- name: Install common packages
  apt:
    name: "{{ system_packages }}"
    state: present
  tags: [common, packages]

- name: Set timezone to UTC
  timezone:
    name: UTC
  tags: [common, system]

- name: Ensure app directory exists
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'
  tags: [common, directories]

- name: Ensure logs directory exists
  file:
    path: "{{ app_dir }}/logs"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'
  tags: [common, directories]
