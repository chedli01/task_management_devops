- name: Create backup directory
  file:
    path: "{{ app_dir }}/backups"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'
  tags: [backup]

- name: Copy backup script
  template:
    src: backup-script.sh.j2
    dest: "{{ app_dir }}/backup.sh"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'
  tags: [backup]

- name: Create backup cron job
  cron:
    name: "Daily database backup"
    minute: "0"
    hour: "2"
    job: "{{ app_dir }}/backup.sh >> {{ app_dir }}/logs/backup.log 2>&1"
    user: "{{ ansible_user }}"
  tags: [backup, cron]