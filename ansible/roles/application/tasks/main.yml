- name: Copy docker-compose file
  template:
    src: "docker-compose.yml.j2"
    dest: "{{ docker_compose_file }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'
  tags: [application, deploy]

- name: Login to Docker Hub
  community.docker.docker_login:
    registry_url: "https://index.docker.io/v1/"
    username: "{{ docker_hub_username }}"
    password: "{{ docker_hub_password }}"
  when: docker_hub_username is defined and docker_hub_password is defined
  no_log: true
  tags: [application, deploy]

- name: Pull and start application containers
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    files:
      - docker-compose.yml
    state: present
    pull: always  # Equivalent to pull: yes
    build: never  # Equivalent to build: no
  tags: [application, deploy]

