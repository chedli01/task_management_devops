resources:
  - namespace.yaml
  - ../../base
  - ingress.yaml

namespace: task-manager-prod

patchesStrategicMerge:
  - patches/postgres-env-patch.yaml

replicas:
  - name: frontend
    count: 5
  - name: backend
    count: 5

images:
  - name: my-registry/frontend 
    newName: chedli01/task-manager-frontend-nginx
    newTag: latest
  - name: my-registry/backend
    newName: chedli01/task-manager-backend
    newTag: latest

configMapGenerator:
  - name: db-config
    literals:
      - POSTGRES_DB=task_manager_prod_db
      - POSTGRES_USER=postgres
  - name: backend-config
    literals:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_NAME=task_manager_prod_db
      - REDIS_URL=redis://redis:6379

secretGenerator:
  - name: db-credentials
    envs:
      - prod-secrets.env
  - name: backend-secrets
    envs:
      - prod-secrets.env